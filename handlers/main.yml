---
- name: "netconsd | Restart netconsd"
  ansible.builtin.systemd:
    name: "{{ lookup('ansible.builtin.vars', 'netconsd_service') }}"
    state: "restarted"
  listen: "Restart netconsd"
  when:
    - "lookup('ansible.builtin.vars', 'netconsd', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'netconsd') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'netconsd_restart', default='')) == 'true'"
  vars:
    netconsd_restart: "[] | map(&restart || 'false', @) | [0]"
