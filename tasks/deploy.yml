---
- name: "netconsd | Deploy netconsd configuration"
  ansible.builtin.template:
    src: "netconsd.j2"
    dest: "{{ lookup('ansible.builtin.vars', 'netconsd_dest') + '/netconsd' }}"
    owner: "root"
    group: "root"
    mode: "0644"
  notify:
    - "Restart netconsd"
- name: "netconsd | Enable netconsd service"
  ansible.builtin.systemd:
    name: "{{ lookup('ansible.builtin.vars', 'netconsd_service') }}"
    enabled: "yes"
  when:
    - "lookup('ansible.builtin.vars', 'netconsd', default='')
      not in ['', [], '[]', None]"
    - "lookup('ansible.builtin.vars', 'netconsd') |
       community.general.json_query(lookup('ansible.builtin.vars',
      'netconsd_enable', default='')) == 'true'"
  vars:
    netconsd_enable: "[] | map(&enable || 'false', @) | [0]"
