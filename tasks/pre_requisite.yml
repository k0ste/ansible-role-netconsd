---
- name: "netconsd | Assert that ansible facts gathered successfully"
  ansible.builtin.assert:
    that:
      - "hostvars[inventory_hostname]['ansible_facts']['service_mgr'] is
        defined"
    fail_msg: "'ansible_facts' not found. Please enable facts gathering"
    quiet: "true"
- name: "netconsd | Assert that system manager is systemd"
  ansible.builtin.assert:
    that:
      - "hostvars[inventory_hostname]['ansible_facts']['service_mgr'] ==
        'systemd'"
    fail_msg: "System manager is not systemd"
    quiet: "true"
- name: "netconsd | Add the OS specific variables"
  ansible.builtin.include_vars:
    file: "{{ hostvars[inventory_hostname]['ansible_facts']['os_family'] +
      '.yml' }}"
- name: "netconsd | Set facts about netconsd role"
  ansible.builtin.set_fact:
    netconsd_settings: "{{ lookup('ansible.builtin.vars', 'netconsd') |
      community.general.json_query('[].settings[]') }}"
    netconsd_package_state: "{{ lookup('ansible.builtin.vars', 'netconsd') |
      community.general.json_query('[].package_state | [0]') }}"
  when:
    - "lookup('ansible.builtin.vars', 'netconsd', default='')
      not in ['', [], '[]', None]"
- name: "netconsd | Assert that netconsd package state in valid value"
  ansible.builtin.assert:
    that:
      - "lookup('ansible.builtin.vars', 'netconsd_package_state') in
        ['present', 'latest']"
    fail_msg: "{{ 'package_state must be in `present` or `latest`,
      current is: ' + lookup('ansible.builtin.vars',
      'netconsd_package_state') }}"
    quiet: "true"
  when:
    - "lookup('ansible.builtin.vars', 'netconsd_package_state',
      default='') not in ['', [], '[]', None, 'present', 'latest']"
- name: "netconsd | Set package state to 'present' cause value is not defined"
  ansible.builtin.set_fact:
    netconsd_package_state: "present"
  when:
    - "lookup('ansible.builtin.vars', 'netconsd_package_state',
      default='') in ['', [], '[]', None]"
- name: "netconsd | Create catalogs"
  ansible.builtin.file:
    path: "{{ lookup('ansible.builtin.vars', 'netconsd_dest') }}"
    state: "directory"
    owner: "root"
    group: "root"
    mode: "0755"
  when:
    - "lookup('ansible.builtin.vars', 'netconsd_settings', default='')
      not in ['', [], '[]', None]"
